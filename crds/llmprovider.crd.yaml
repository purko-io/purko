apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: llmproviders.purko.io
spec:
  group: purko.io
  names:
    kind: LLMProvider
    listKind: LLMProviderList
    plural: llmproviders
    singular: llmprovider
    shortNames:
    - llm
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Type
      type: string
      jsonPath: .spec.type
    - name: Model
      type: string
      jsonPath: .spec.model
    - name: Default
      type: boolean
      jsonPath: .spec.default
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Models
      type: integer
      jsonPath: .status.availableModels
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - type
            - model
            properties:
              type:
                type: string
                description: Provider type
                enum:
                - vertex-ai
                - anthropic
                - openai
                - ollama
                - custom
              endpoint:
                type: string
                description: Custom API endpoint URL
              apiFormat:
                type: string
                description: API protocol format
                enum:
                - anthropic
                - openai
              model:
                type: string
                description: Default model name
              models:
                type: array
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    displayName:
                      type: string
                    maxTokens:
                      type: integer
                    pricing:
                      type: object
                      properties:
                        inputPerMToken:
                          type: number
                        outputPerMToken:
                          type: number
              config:
                type: object
                additionalProperties:
                  type: string
              credentials:
                type: object
                properties:
                  secretRef:
                    type: string
                  secretKey:
                    type: string
              healthCheck:
                type: object
                properties:
                  enabled:
                    type: boolean
                  intervalSeconds:
                    type: integer
                  timeoutSeconds:
                    type: integer
              fallback:
                type: object
                properties:
                  providerRef:
                    type: string
              default:
                type: boolean
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Ready
                - Error
                - Degraded
              message:
                type: string
              lastHealthCheck:
                type: string
                format: date-time
              availableModels:
                type: integer
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  - lastTransitionTime
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
