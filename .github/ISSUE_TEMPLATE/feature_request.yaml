name: Feature Request
description: Suggest a new feature for Purko
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why do you need it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: crd-impact
    attributes:
      label: CRD Impact
      description: Does this require CRD changes?
      options:
        - None
        - New CRD
        - Existing CRD change
        - Controller change only
    validations:
      required: true
