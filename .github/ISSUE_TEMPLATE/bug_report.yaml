name: Bug Report
description: Report a bug in Purko
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - minikube
        - kind
        - OpenShift
        - EKS
        - GKE
        - AKS
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Purko Version
      description: "e.g., v1.5.0"
      placeholder: v1.5.0
    validations:
      required: true
  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes Version
      description: "Output of kubectl version --short"
      placeholder: v1.32.0
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output here.
      render: shell
