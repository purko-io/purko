name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Dashboard static bundle digest (Spec 28)
        # dashboard/static/ is a byte-identical copy of the private upstream
        # bundle, recorded in static.sha256 by the sync script. Never
        # hand-edit OSS JS: a drifted bundle desynchronizes Pro teasers from
        # the compiled-in endpoints. Fails on post-sync divergence.
        run: |
          cd dashboard
          digest=$(find static -type f | LC_ALL=C sort | xargs shasum -a 256 | shasum -a 256 | cut -d' ' -f1)
          recorded=$(cat static.sha256)
          if [ "$digest" != "$recorded" ]; then
            echo "dashboard/static/ differs from recorded digest ($digest != $recorded)"
            echo "Do not hand-edit OSS static files; run the upstream sync script."
            exit 1
          fi

  python-check:
    name: Python Executor Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python3 -c "import py_compile; py_compile.compile('executor/executor.py', doraise=True)"

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint deploy/helm/

      - name: Template
        run: helm template purko deploy/helm/

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build docs
        run: cd docs-site && mkdocs build --strict
