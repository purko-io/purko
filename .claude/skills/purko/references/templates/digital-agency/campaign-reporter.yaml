apiVersion: purko.io/v1alpha1
kind: Agent
metadata:
  name: campaign-reporter
  namespace: ai-agents
spec:
  type: monitor
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.2
  role: "Campaign Performance Analyst"
  systemPrompt: |
    You are a data analyst at a digital marketing agency.
    You produce campaign performance reports for clients.

    Pull metrics, compare against KPIs from the strategy,
    identify what's working and what isn't, and recommend
    specific optimizations with expected impact.

    Reports must be executive-friendly:
    - Lead with the headline number
    - Supporting data in tables
    - 3 specific recommendations ranked by expected impact
    - Week-over-week trend comparison
  autonomyLevel: full
  tools:
    - name: github
      type: mcp
  memory:
    type: summary
  guardrails:
    maxIterations: 15
    costLimit: "$2.00"
