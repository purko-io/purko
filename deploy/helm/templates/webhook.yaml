{{- if .Values.webhooks.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: purko-validating-webhook
  labels:
    app.kubernetes.io/part-of: purko
webhooks:
  - name: vagent.purko.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: purko-webhook
        namespace: {{ .Values.namespace }}
        path: /validate-purko-io-v1alpha1-agent
    rules:
      - apiGroups: ["purko.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["agents"]
    sideEffects: None
    failurePolicy: Fail
  - name: vworkflow.purko.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: purko-webhook
        namespace: {{ .Values.namespace }}
        path: /validate-purko-io-v1alpha1-workflow
    rules:
      - apiGroups: ["purko.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["workflows"]
    sideEffects: None
    failurePolicy: Fail
---
apiVersion: v1
kind: Service
metadata:
  name: purko-webhook
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: 443
      targetPort: 9443
  selector:
    app.kubernetes.io/name: purko-operator
{{- end }}
