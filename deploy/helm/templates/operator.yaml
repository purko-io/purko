apiVersion: apps/v1
kind: Deployment
metadata:
  name: purko-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: purko-operator
    app.kubernetes.io/part-of: purko
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: purko-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purko-operator
        app.kubernetes.io/part-of: purko
    spec:
      serviceAccountName: purko-operator
      {{- if .Values.operator.hostNetwork }}
      hostNetwork: true
      dnsPolicy: Default
      {{- else }}
      dnsPolicy: {{ .Values.operator.dnsPolicy }}
      {{- end }}
      {{- with .Values.operator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: {{ .Values.operator.image }}
          {{- with .Values.operator.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --agent-namespace={{ .Values.agentNamespace }}
            {{- if .Values.webhooks.enabled }}
            - --enable-webhooks=true
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            - --dashboard-port={{ .Values.dashboard.port }}
            {{- else }}
            - --dashboard-enabled=false
            {{- end }}
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
            {{- if .Values.dashboard.enabled }}
            - containerPort: {{ .Values.dashboard.port }}
              name: dashboard
            {{- end }}
          env:
            {{- if .Values.licensing.tier }}
            # Tier gates limits + history retention (pkg/licensing);
            # empty tier = dev mode (all features, unlimited retention).
            - name: PURKO_LICENSE
              value: {{ .Values.licensing.tier | quote }}
            {{- end }}
            {{- if .Values.executor.image }}
            # Default step-executor image for agents without spec.runtime.image;
            # without this, fresh installs cannot run workflows (localhost dev
            # image fallback).
            - name: PURKO_EXECUTOR_IMAGE
              value: {{ .Values.executor.image | quote }}
            {{- end }}
            {{- if .Values.operator.history.enabled }}
            - name: PURKO_HISTORY_ENABLED
              value: "true"
            {{- end }}
            - name: PURKO_MEMORY_ENABLED
              value: {{ .Values.operator.memory.enabled | quote }}
            {{- if .Values.operator.memory.forgetEnabled }}
            - name: PURKO_MEMORY_FORGET_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.executor.hostNetwork }}
            - name: PURKO_EXECUTOR_HOST_NETWORK
              value: "true"
            {{- end }}
            {{- if .Values.llm.credentials.vertexProjectId }}
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.llm.credentials.vertexProjectId | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.llm.credentials.vertexRegion | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/credentials.json
            {{- end }}
            {{- if .Values.llm.credentials.secretName }}
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.credentials.secretName }}
                  key: {{ .Values.llm.credentials.secretKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          {{- if or .Values.llm.credentials.vertexProjectId .Values.webhooks.enabled .Values.operator.history.enabled .Values.operator.memory.enabled }}
          volumeMounts:
            {{- if .Values.llm.credentials.vertexProjectId }}
            - name: gcp-creds
              mountPath: /var/run/secrets/gcp
              readOnly: true
            {{- end }}
            {{- if or .Values.operator.history.enabled .Values.operator.memory.enabled }}
            - name: history
              mountPath: /var/lib/purko
            {{- end }}
            {{- if .Values.webhooks.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.llm.credentials.vertexProjectId .Values.webhooks.enabled .Values.operator.history.enabled .Values.operator.memory.enabled }}
      volumes:
        {{- if .Values.llm.credentials.vertexProjectId }}
        - name: gcp-creds
          secret:
            secretName: {{ .Values.llm.credentials.gcpSecretName }}
            optional: true
        {{- end }}
        {{- if or .Values.operator.history.enabled .Values.operator.memory.enabled }}
        - name: history
          persistentVolumeClaim:
            claimName: purko-history
        {{- end }}
        {{- if .Values.webhooks.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ .Values.webhooks.tls.secretName }}
        {{- end }}
      {{- end }}
