apiVersion: v1
kind: Pod
metadata:
  name: purko-test-health
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: purko-test
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          echo "Testing operator health endpoint..."
          wget -q --spider --timeout=10 http://purko-operator:8081/healthz
          echo "PASS: Operator is healthy"
