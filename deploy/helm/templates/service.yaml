apiVersion: v1
kind: Service
metadata:
  name: purko-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: purko-operator
    app.kubernetes.io/part-of: purko
spec:
  selector:
    app.kubernetes.io/name: purko-operator
  ports:
    - name: health
      port: 8081
      targetPort: 8081
    - name: metrics
      port: 8080
      targetPort: 8080
    {{- if .Values.dashboard.enabled }}
    - name: dashboard
      port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
    {{- end }}
