operator:
  image: ghcr.io/purko-io/purko-operator:latest
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # hostNetwork required for minikube/podman (disable on real clusters)
  hostNetwork: false
  dnsPolicy: ClusterFirst
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  pdb:
    enabled: true
    minAvailable: 1

executor:
  image: ghcr.io/purko-io/purko-executor:latest
  variants:
    git: ghcr.io/purko-io/purko-executor:git
    dev: ghcr.io/purko-io/purko-executor:dev
    codeact: ghcr.io/purko-io/purko-executor:codeact
  # Host networking for executor pods. Leave false so executors reach
  # in-cluster services (LLM endpoints, MCP servers) via cluster DNS.
  # Set true only for local dev where MCP servers run on the node
  # (e.g. minikube with MCP servers on localhost).
  hostNetwork: false

llm:
  # Provider: vertex-ai | anthropic | openai | "" (auto-detect from env)
  provider: ""
  model: claude-sonnet-4-6
  credentials:
    # For Vertex AI
    vertexProjectId: ""
    vertexRegion: "us-east5"
    gcpSecretName: "gcp-credentials"
    # For direct API
    secretName: ""
    secretKey: "api-key"

dashboard:
  enabled: true    # Spec 28: community dashboard (Pro features render upgrade teasers)
  port: 8082

webhooks:
  enabled: false
  # By default the chart generates a self-signed CA + serving cert at install
  # time (reused across upgrades). Enable certManager to delegate cert
  # lifecycle to cert-manager instead (requires cert-manager >= 1.0).
  certManager:
    enabled: false
  tls:
    # Name of the Secret holding the webhook serving certificate. Shared by
    # webhook.yaml (Secret/Certificate/caBundle) and the operator's cert
    # volume mount. Point at a pre-provisioned kubernetes.io/tls Secret to
    # bring your own certificates.
    secretName: purko-webhook-server-cert

namespace: purko-system
agentNamespace: ai-agents

# Starter agent library — installs the six archetype agents (router, planner,
# code executor, code reviewer, monitor, retriever) so a fresh install has a
# working agent set. Disable for clusters that manage agents themselves.
# provider resolves against LLMProvider CRs by name, falling back to the
# provider marked `default: true`.
starterAgents:
  enabled: true
  provider: anthropic
  model: claude-sonnet-4-6

# MCP servers registered in the platform
# MCP servers registered in the platform. Empty by default — servers that
# point at endpoints which do not exist show as permanently Failed in the
# dashboard. Register real servers here or via the MCPServer CRD.
mcpServers: []
# Example:
# mcpServers:
#   - name: lumino
#     url: http://lumino.ai-agents:8000
#     auth: none
#     icon: "\U0001F537"
#     category: kubernetes
#   - name: github
#     url: http://github-mcp.ai-agents:9090
#     auth: bearer
#     secretRef: github-mcp-token
#     icon: "\U0001F419"
#     category: code

# Quick deploy presets (loaded into purko-presets ConfigMap)
presets: []

# Trigger routing rules
triggerRules:
  - name: catch-all
    source: "*"
    match: {}
    workflow: "_intent"
