operator:
  image: ghcr.io/purko-io/purko-operator:latest
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  # hostNetwork required for minikube/podman (disable on real clusters)
  hostNetwork: false
  dnsPolicy: ClusterFirst
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  pdb:
    enabled: true
    minAvailable: 1

executor:
  image: ghcr.io/purko-io/purko-executor:latest
  variants:
    git: ghcr.io/purko-io/purko-executor:git
    dev: ghcr.io/purko-io/purko-executor:dev

llm:
  # Provider: vertex-ai | anthropic | openai | "" (auto-detect from env)
  provider: ""
  model: claude-sonnet-4-6
  credentials:
    # For Vertex AI
    vertexProjectId: ""
    vertexRegion: "us-east5"
    gcpSecretName: "gcp-credentials"
    # For direct API
    secretName: ""
    secretKey: "api-key"

dashboard:
  enabled: false
  port: 8082

webhooks:
  enabled: false
  # By default the chart generates a self-signed CA + serving cert at install
  # time (reused across upgrades). Enable certManager to delegate cert
  # lifecycle to cert-manager instead (requires cert-manager >= 1.0).
  certManager:
    enabled: false

namespace: purko-system
agentNamespace: ai-agents

# MCP servers registered in the platform
mcpServers:
  - name: lumino
    url: http://localhost:8000
    auth: none
    icon: "\U0001F537"
    category: kubernetes
  - name: github
    url: http://localhost:9090
    auth: bearer
    secretRef: github-mcp-token
    icon: "\U0001F419"
    category: code

# Quick deploy presets (loaded into purko-presets ConfigMap)
presets: []

# Trigger routing rules
triggerRules:
  - name: catch-all
    source: "*"
    match: {}
    workflow: "_intent"
