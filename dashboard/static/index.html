<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Purko</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f916;</text></svg>">
</head>
<body>
<div class="shell">

<header class="header">
  <div class="header-left">
    <h1 class="logo">Purko</h1>
    <span class="header-subtitle">CRD Platform</span>
  </div>
  <div class="header-right">
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span class="live-label">LIVE</span>
    </div>
    <span id="header-user" style="display:none;font-size:11px;color:var(--dim);margin-right:14px">
      <span id="header-user-email" style="color:var(--text)"></span>
      <a href="/oauth2/sign_out?rd=%2F" style="color:var(--accent);margin-left:8px;text-decoration:none">Sign out</a>
    </span>
    <span class="header-time" id="header-time">--:--</span>
  </div>
</header>

<nav class="nav" id="main-nav">
  <button class="nav-tab active" data-tab="dashboard" onclick="router.go('dashboard')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </button>
  <button class="nav-tab" data-tab="agents" onclick="router.go('agents')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
    Agents
  </button>
  <button class="nav-tab" data-tab="workflows" onclick="router.go('workflows')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Workflows
  </button>
  <button class="nav-tab" data-tab="mcp" onclick="router.go('mcp')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    MCP
  </button>
  <button class="nav-tab" data-tab="llm" onclick="router.go('llm')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    LLM
  </button>
  <button class="nav-tab" data-tab="history" onclick="router.go('history')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    History
  </button>
  <button class="nav-tab nav-tab--settings" data-tab="settings" onclick="router.go('settings')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>
</nav>

<main class="main">
  <div id="view-dashboard" class="view active"></div>
  <div id="view-agents" class="view"></div>
  <div id="view-workflows" class="view"></div>
  <div id="view-mcp" class="view"></div>
  <div id="view-llm" class="view"></div>
  <div id="view-history" class="view"></div>
  <div id="view-settings" class="view"></div>
</main>

</div>

<script src="/static/app.js"></script>
<script src="/static/dashboard.js"></script>
<script src="/static/agents.js"></script>
<script src="/static/workflows.js"></script>
<script src="/static/mcp.js"></script>
<script src="/static/llm.js"></script>
<script src="/static/history.js"></script>
<script src="/static/settings.js"></script>
</body>
</html>
